<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smaki Świata - Rejestracja</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

</head>

<body>



    <main>
        <div class="register-container">
            <h2 class="register-title">Zarejestruj się</h2>

            <form action="register.php" method="POST">

                <div class="form-group">
                    <label for="email">Nazwa Użytkownika</label>
                    <input type="user" id="user" name="user" class="form-control" required>
                </div>


                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Potwierdź hasło</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                </div>

                <button type="submit" class="btn-register">Zarejestruj się</button>

                <div class="register-footer">
                    <p>Masz już konto? <a routerLink="/login">Zaloguj się</a></p>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
